# Lite variant: no KServe CRDs required. Same request path
# (API -> LiteLLM -> vLLM sim), deployable on k3s/kind in one apply.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - litellm-configmap.yaml
  - litellm-deployment.yaml
  - litellm-service.yaml
  - control-plane-api.yaml
  - vllm-sim.yaml
