# Plain-Deployment variant of the vLLM simulator for clusters without KServe
# CRDs (k3s, kind, demo clusters). The Service keeps the same name the KServe
# predictor would get, so the LiteLLM config is identical in both variants.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-vllm-sim
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: platform-vllm-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-vllm-sim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-vllm-sim
    spec:
      automountServiceAccountToken: false
      containers:
        - name: vllm-sim
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.10.0
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - platform-vllm-sim
            - --port
            - "8000"
            - --mode
            - echo
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: platform-vllm-sim-predictor
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: platform-vllm-sim
spec:
  selector:
    app.kubernetes.io/name: platform-vllm-sim
  ports:
    - name: http
      port: 80
      targetPort: http
