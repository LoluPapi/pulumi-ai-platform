apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: platform-vllm-sim
  namespace: ai-platform
  annotations:
    serving.kserve.io/deploymentMode: Standard
    ai-platform.io/demo-profile: tiny-quota-simulator
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    containers:
      - name: kserve-container
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.10.0
        imagePullPolicy: IfNotPresent
        args:
          - --model
          - platform-vllm-sim
          - --port
          - "8000"
          - --mode
          - echo
        ports:
          - name: http
            containerPort: 8000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
